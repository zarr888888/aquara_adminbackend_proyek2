version: '3.8'

services:

  app:
    image: ghcr.io/zarr888888/aquara_adminbackend_proyek2:latest
    container_name: laravel_app
    restart: always
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: aquara_proyek2
      MYSQL_ROOT_PASSWORD: rootpasswordharusnyaunik
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:

volumes:
  db_data: