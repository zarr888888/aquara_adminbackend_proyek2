name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zarr888888/aquara_adminbackend_proyek2

jobs:

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dan Push Image ke GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |

            set -e

            echo "🚀 Mulai deployment..."

            echo "🔐 Login ke GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📂 Masuk ke folder project..."
            cd /home/${{ secrets.SERVER_USER }}/RPL2B-Kelompok-5

            echo "📦 Pull image terbaru..."
            docker pull ghcr.io/zarr888888/aquara_adminbackend_proyek2:latest

            echo "🧹 Hapus container lama..."
            docker rm -f aquara_app || true
            docker rm -f aquara_db || true

            echo "⬇️ Stop docker compose lama..."
            docker compose down --remove-orphans || true

            echo "🚀 Menjalankan container baru..."
            docker compose pull
            docker compose up -d

            echo "⏳ Menunggu container siap..."
            sleep 20

            echo "🗄️ Menunggu database siap..."
            until docker compose exec -T db mysqladmin ping -h "localhost" --silent; do
              echo "Database belum siap, menunggu..."
              sleep 5
            done

            echo "🗄️ Menjalankan migration..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            echo "🧹 Membersihkan cache Laravel..."
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan cache:clear

            echo "✅ Deployment selesai!"