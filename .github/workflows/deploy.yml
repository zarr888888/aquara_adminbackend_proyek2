name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # coba
  # ─── JOB 1: TESTING ───────────────────────────────────────
  # test:
