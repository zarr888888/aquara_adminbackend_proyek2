  #     - name: Generate app key
  #       run: php artisan key:generate

  #     - name: Run PHPUnit tests
  #       run: php artisan test

  # ─── JOB 2: BUILD & PUSH IMAGE ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── JOB 3: DEPLOY KE VPS ────────────────────────────────
  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "🚀 Mulai deployment..."

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /home/${{ secrets.SERVER_USER }}/kelompok-5

            echo "📦 Pull image terbaru..."
            docker pull ghcr.io/${{ github.repository }}:latest

            echo "🧹 Hapus container lama..."
            docker rm -f laravel_app || true
            docker rm -f laravel_db || true

            echo "⬇️ Stop compose lama..."
            docker compose down --remove-orphans || true

            echo "🚀 Start container baru..."
            docker compose up -d --build

            echo "⏳ Menunggu database ready..."

            until docker compose exec -T db mysqladmin ping -h "localhost" --silent; do
              sleep 2
            done

            echo "🗄️ Running migration..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            echo "✅ Deployment selesai!"